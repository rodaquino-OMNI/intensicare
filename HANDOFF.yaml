    notes: "Implementado, testado e validado (NEWS2-v1.0). 7 parâmetros, Escala 1 e 2."

  - id: "MVP-003"
    title: "SOFA scoring engine"
    notes: "Implementado, testado e validado (SOFA-v1.0). 6 sistemas orgânicos."

  - id: "MVP-004"
    title: "qSOFA scoring engine"
