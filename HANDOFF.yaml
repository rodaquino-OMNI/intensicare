# HANDOFF.yaml — Blocked/Completed tracking for IntensiCare
# Atualizado: 26 de junho de 2026
#
# Bloqueios que impedem produção:
# - Regulatórios (ANVISA, LGPD)
# - Técnicos (audit_trail, criptografia PHI)
# - Clínicos (validação com dados reais)

blocked:
  - id: "REG-001"
    title: "ANVISA SaMD Classification"
    severity: critical
    description: "Classificação formal do software como dispositivo médico (SaMD) — Classe II preliminar."
    resolution: "Contratar consultoria especializada em regulação ANVISA para SaMD."
    deadline: "2026-Q3"

  - id: "REG-002"
    title: "LGPD RIPD (Relatório de Impacto à Proteção de Dados)"
    severity: critical
    description: "RIPD obrigatório para processamento de dados de saúde (sensíveis, Art. 11 LGPD)."
    resolution: "DPO + time jurídico devem elaborar RIPD antes de processar dados de pacientes reais."
    deadline: "2026-Q3"

  - id: "TECH-001"
    title: "Tabela audit_trail imutável"
    severity: critical
    description: "Invariante arquitetural #1. Trilha de auditoria append-only com trigger anti-mutação."
    resolution: "Implementar tabela audit_trail + trigger antes da primeira ingestão de dados reais."
    deadline: "Antes do piloto clínico"

  - id: "TECH-002"
    title: "Criptografia em repouso (pgcrypto para PHI)"
    severity: critical
    description: "Campos PHI (nome, CPF, CNS) devem ser criptografados com pgcrypto. Invariante #4."
    resolution: "Implementar criptografia de colunas sensíveis via pgcrypto."
    deadline: "Antes do piloto clínico"

  - id: "TECH-003"
    title: "Dead man's switch externo"
    severity: high
    description: "Monitoramento externo que alerta se a API ficar indisponível. Invariante #5."
    resolution: "Script externo de health check com alerta (PagerDuty/similar)."
    deadline: "Antes do piloto clínico"

  - id: "TECH-004"
    title: "IdempotencyStore em Redis para produção"
    severity: medium
    description: "Implementação atual usa store em memória. Produção precisa de Redis com TTL."
    resolution: "Migrar IdempotencyStore para Redis com TTL configurável."
    deadline: "Fase 2"

  - id: "CLIN-001"
    title: "Validação clínica com dados reais"
    severity: critical
    description: "Nenhum teste foi feito com tráfego HL7 real de hospital."
    resolution: "Piloto de 48h com tráfego HL7 real do hospital AUSTA."
    deadline: "Fase 2 (Sprint 4)"

  - id: "CLIN-002"
    title: "Clinical Validation Protocol"
    severity: high
    description: "Protocolo formal de validação para scores MEWS/NEWS2/SOFA/qSOFA contra gold-standard."
    resolution: "Time clínico deve elaborar e executar protocolo de validação."
    deadline: "2026-Q3"

  - id: "SEC-001"
    title: "Pentest externo"
    severity: high
    description: "Teste de penetração por empresa externa antes do go-live."
    resolution: "Contratar empresa de segurança para pentest."
    deadline: "2026-Q4"

  - id: "SEC-002"
    title: "TLS/HTTPS em produção"
    severity: high
    description: "Reverse proxy com Caddy + TLS automático ainda não configurado."
    resolution: "Configurar Caddy como reverse proxy com Let's Encrypt."
    deadline: "Fase 3"

  # --- AUDIT FINDINGS (2026-06-26) ---
  - id: "AUDIT-001"
    title: "MEWS scoring: 3 parâmetros inflados vs Subbe 2001"
    severity: critical
    description: "Heart rate ≤40 (3 vs 2), HR 41-50 (2 vs 1), RR ≤8 (3 vs 2), Temp ≤35.0 (3 vs 2). Copiados do NEWS2 em vez do MEWS original."
    resolution: "Corrigir thresholds baixos para Subbe 2001. Atualizar algorithm_version para MEWS-v1.0.1."
    deadline: "Antes do piloto clínico"

  - id: "AUDIT-002"
    title: "NEWS2 Scale 2 (hypercapnic): 5 boundary errors + O2 integration gap"
    severity: critical
    description: "Bandas 86-87% (2 vs 1) e 88-92% (1 vs 0) deslocadas vs RCP 2017. SpO2≥93% em O2 não integrado corretamente."
    resolution: "Corrigir score_spo2() para RCP 2017 Scale 2. Adicionar parâmetro supplemental_o2."
    deadline: "Antes do piloto clínico"

  - id: "AUDIT-003"
    title: "SOFA: dual risk-classification paths inconsistent"
    severity: medium
    description: "Live path e idempotent-replay path usam thresholds e formatos diferentes para mortalidade."
    resolution: "Unificar classificação de risco em single source of truth."
    deadline: "Fase 2"

  - id: "AUDIT-004"
    title: "Invariante #5: Health check sem verificações de dependências"
    severity: high
    description: "/health retorna estático — não verifica PostgreSQL nem Redis. Se banco cair, health check ainda diz 'healthy'."
    resolution: "Adicionar SELECT 1 no PostgreSQL e redis.ping() ao health check."
    deadline: "Antes do piloto clínico"

  - id: "AUDIT-005"
    title: "Invariante #6: Retry/backoff não implementado"
    severity: high
    description: "tenacity é dead dependency (instalado, nunca importado). Nenhum retry para notificações de alerta."
    resolution: "Implementar ARQ worker ou tenacity retry decorator para alert delivery."
    deadline: "Fase 2"

  - id: "AUDIT-006"
    title: "review-queue.md: audit_trail marcado como IMPLEMENTADO (falso)"
    severity: medium
    description: "docs/review-queue.md linha 26 afirma que audit_trail está IMPLEMENTADO. Não existe tabela, modelo ou trigger."
    resolution: "Corrigir review-queue.md para PENDENTE. Remover claim falso. ✅ CORRIGIDO em 2026-06-26."
    deadline: "Imediato"

  - id: "AUDIT-007"
    title: "API contract mismatch: GET /api/v1/alerts array vs frontend objeto"
    severity: medium
    description: "Backend retorna list[AlertResponse] direto. Frontend AlertListResponse espera {alerts: AlertInfo[], total: number}."
    resolution: "Alinhar contrato: backend wrappar em objeto ou frontend consumir array puro."
    deadline: "Fase 2"

  - id: "AUDIT-008"
    title: "Severity enum mismatch: backend watch/urgent/critical vs frontend info/warning/critical"
    severity: medium
    description: "BedGrid usa 'warning' que não existe no backend. Sorting de severidade quebrado."
    resolution: "Padronizar severity enum entre backend e frontend."
    deadline: "Fase 2"

