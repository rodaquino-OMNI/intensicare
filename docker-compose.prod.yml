# =============================================================================
# Intensicare — Production Deployment Compose
# Stack: FastAPI (production) + React/nginx (production) + PostgreSQL + Redis
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml ps
#   docker compose -f docker-compose.prod.yml down
#
# Prerequisites:
#   - .env file with production secrets (DB passwords, JWT keys, etc.)
#   - TLS termination handled by a reverse proxy (traefik, nginx, cloud LB)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 + TimescaleDB 2.x
  # ---------------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb:2.18.0-pg16
    container_name: intensicare-postgres-prod
    restart: unless-stopped
    # No public port exposure — only accessible on the internal network.
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-intensicare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-intensicare}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -U ${POSTGRES_USER:-intensicare} -d ${POSTGRES_DB:-intensicare}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - intensicare-prod
    # Resource limits for production
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Redis 7 — cache, rate limiting, pub/sub
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: intensicare-redis-prod
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - intensicare-prod
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # API — FastAPI production (no hot-reload, no dev volumes)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: ${API_IMAGE:-intensicare-api:latest}
    container_name: intensicare-api-prod
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-intensicare}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-intensicare}"
      REDIS_URL: "redis://redis:6379/0"
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - intensicare-prod
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Frontend — React SPA served by nginx
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    image: ${FRONTEND_IMAGE:-intensicare-frontend:latest}
    container_name: intensicare-frontend-prod
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - intensicare-prod
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data_prod:
    name: intensicare-postgres-data-prod
  redis_data_prod:
    name: intensicare-redis-data-prod

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
networks:
  intensicare-prod:
    name: intensicare-prod
    driver: bridge
